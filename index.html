<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Pirates of the Procedural Sea</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{overflow:hidden;touch-action:none;background:#000;font-family:'Segoe UI',Tahoma,sans-serif;color:#e0d6c2;cursor:default;width:100%;height:100%;position:fixed;}
canvas{display:block;touch-action:none;}
input,textarea{-webkit-user-select:text;user-select:text;}
#ui-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#ui-layer>*{pointer-events:auto;}
#hud-top{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:95vw;}
.hud-box{background:rgba(20,12,8,0.85);border:1px solid rgba(180,140,60,0.5);border-radius:6px;padding:5px 10px;font-size:12px;backdrop-filter:blur(4px);white-space:nowrap;}
#minimap{position:absolute;bottom:10px;right:10px;width:140px;height:140px;border:2px solid rgba(180,140,60,0.6);border-radius:8px;overflow:hidden;background:rgba(10,30,60,0.8);}
#minimap canvas{width:100%;height:100%;}
.side-panel{position:absolute;top:50%;transform:translateY(-50%);width:240px;max-width:80vw;background:rgba(20,12,8,0.95);border:1px solid rgba(180,140,60,0.5);border-radius:8px;padding:12px;display:none;backdrop-filter:blur(6px);max-height:75vh;overflow-y:auto;z-index:20;}
.side-panel h3{color:#d4a848;margin-bottom:8px;font-size:14px;text-transform:uppercase;letter-spacing:1px;}
#ship-panel{left:10px;}
#inventory-panel{right:10px;}
.part-slot{background:rgba(40,30,20,0.6);border:1px solid rgba(120,90,40,0.4);border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;min-height:44px;display:flex;flex-direction:column;justify-content:center;}
.part-slot:hover,.part-slot:active{border-color:#d4a848;background:rgba(60,45,25,0.6);}
.part-slot.active{border-color:#d4a848;box-shadow:0 0 8px rgba(212,168,72,0.3);}
.part-slot .label{font-size:11px;color:#a09080;text-transform:uppercase;}
.part-slot .value{font-size:13px;color:#e0d6c2;margin-top:2px;}
.inv-item{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(40,30,20,0.5);border-radius:6px;margin-bottom:4px;font-size:13px;min-height:44px;}
.inv-item .icon{width:32px;height:32px;background:rgba(180,140,60,0.3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
#crew-panel{position:absolute;left:10px;bottom:60px;background:rgba(20,12,8,0.95);border:1px solid rgba(180,140,60,0.5);border-radius:8px;padding:10px;display:none;backdrop-filter:blur(6px);width:280px;max-width:80vw;z-index:20;}
#crew-panel h3{color:#d4a848;margin-bottom:6px;font-size:13px;text-transform:uppercase;letter-spacing:1px;}
.crew-member{display:flex;align-items:center;gap:8px;padding:6px;margin-bottom:3px;background:rgba(40,30,20,0.4);border-radius:6px;font-size:12px;min-height:40px;}
.crew-member .role{color:#d4a848;font-weight:bold;min-width:60px;}
.crew-health{width:40px;height:6px;background:rgba(60,20,20,0.6);border-radius:3px;overflow:hidden;}
.crew-health div{height:100%;background:#4a2;border-radius:3px;}
#chat-box{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:360px;max-width:90vw;background:rgba(20,12,8,0.9);border:1px solid rgba(180,140,60,0.4);border-radius:8px;padding:8px;display:none;backdrop-filter:blur(4px);z-index:20;}
#chat-log{height:100px;overflow-y:auto;font-size:12px;margin-bottom:6px;padding:4px;}
#chat-log div{margin-bottom:3px;}
#chat-input{width:100%;background:rgba(40,30,20,0.6);border:1px solid rgba(120,90,40,0.4);border-radius:6px;padding:8px;color:#e0d6c2;font-size:14px;outline:none;min-height:44px;}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a1628 0%,#0d2847 50%,#1a3a5c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px;}
#start-screen h1{font-size:clamp(24px,6vw,48px);color:#d4a848;text-shadow:0 0 30px rgba(212,168,72,0.4);margin-bottom:10px;letter-spacing:2px;text-align:center;}
#start-screen p{color:#8090a0;margin-bottom:30px;font-size:clamp(14px,3vw,16px);text-align:center;}
#start-btn{background:linear-gradient(135deg,#8b6914,#d4a848);color:#1a0f00;border:none;padding:16px 44px;font-size:18px;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:1px;transition:all 0.3s;min-height:52px;touch-action:manipulation;}
#start-btn:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(212,168,72,0.5);}
#notification{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(20,12,8,0.9);border:1px solid #d4a848;border-radius:6px;padding:8px 20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:30;}
.toolbar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:15;}
.tb-btn{background:rgba(20,12,8,0.88);border:1px solid rgba(180,140,60,0.5);border-radius:8px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all 0.15s;touch-action:manipulation;}
.tb-btn:hover,.tb-btn:active{border-color:#d4a848;background:rgba(40,25,10,0.95);}
.tb-btn.active{border-color:#d4a848;background:rgba(60,40,15,0.95);}
#anchor-status{position:absolute;top:50px;right:10px;}
#compass{position:absolute;top:8px;left:10px;width:90px;height:90px;pointer-events:none;}
#compass canvas{width:100%;height:100%;}
#create-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a1628 0%,#0d2847 50%,#1a3a5c 100%);display:none;z-index:99;overflow-y:auto;padding:20px;}
#create-screen .inner{max-width:420px;margin:0 auto;padding:20px 0;}
#create-screen h2{color:#d4a848;text-align:center;font-size:clamp(20px,5vw,28px);margin-bottom:20px;letter-spacing:2px;}
#create-screen label{display:block;color:#a09080;font-size:12px;text-transform:uppercase;margin:12px 0 4px;letter-spacing:1px;}
#create-screen input[type="text"]{width:100%;background:rgba(30,20,15,0.8);border:1px solid rgba(180,140,60,0.4);border-radius:6px;padding:10px 12px;color:#e0d6c2;font-size:15px;outline:none;min-height:44px;}
#create-screen input[type="text"]:focus{border-color:#d4a848;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.color-swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.15s;touch-action:manipulation;}
.color-swatch:hover,.color-swatch.sel{border-color:#d4a848;transform:scale(1.15);}
.crew-edit{background:rgba(30,20,15,0.5);border:1px solid rgba(180,140,60,0.3);border-radius:8px;padding:12px;margin-bottom:10px;}
.crew-edit .role-tag{display:inline-block;background:rgba(212,168,72,0.2);color:#d4a848;font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:6px;text-transform:uppercase;}
#create-launch{background:linear-gradient(135deg,#8b6914,#d4a848);color:#1a0f00;border:none;padding:16px 44px;font-size:18px;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:1px;transition:all 0.3s;min-height:52px;touch-action:manipulation;display:block;margin:24px auto 0;width:100%;max-width:280px;}
#create-launch:hover{transform:scale(1.03);box-shadow:0 0 25px rgba(212,168,72,0.5);}
/* Mobile touch controls */
#touch-controls{display:none;position:fixed;bottom:0;left:0;width:100%;height:40%;pointer-events:none;z-index:12;}
#joystick-zone{position:absolute;bottom:20px;left:20px;width:130px;height:130px;pointer-events:auto;touch-action:none;}
#joystick-base{width:110px;height:110px;background:rgba(180,140,60,0.15);border:2px solid rgba(180,140,60,0.35);border-radius:50%;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
#joystick-knob{width:44px;height:44px;background:rgba(212,168,72,0.5);border:2px solid rgba(212,168,72,0.7);border-radius:50%;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);transition:none;}
#touch-actions{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;pointer-events:auto;}
.touch-btn{width:56px;height:56px;background:rgba(20,12,8,0.8);border:2px solid rgba(180,140,60,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#d4a848;touch-action:manipulation;cursor:pointer;}
.touch-btn:active{background:rgba(60,40,15,0.9);border-color:#d4a848;}
.touch-btn.held{background:rgba(80,50,10,0.9);border-color:#ffcc44;}
#controls-help{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(20,12,8,0.95);border:1px solid rgba(180,140,60,0.5);border-radius:8px;padding:15px 25px;text-align:center;font-size:12px;line-height:2;display:none;z-index:20;max-width:90vw;}
#controls-help h2{color:#d4a848;margin-bottom:8px;font-size:16px;}
#controls-help kbd{background:rgba(180,140,60,0.3);border:1px solid rgba(180,140,60,0.5);border-radius:3px;padding:2px 6px;font-family:inherit;}
@media(max-width:768px){
  .hud-box{font-size:11px;padding:4px 8px;}
  #compass{width:70px;height:70px;}
  #minimap{width:100px;height:100px;bottom:70px;}
  .side-panel{width:85vw;max-width:300px;}
  #crew-panel{width:85vw;max-width:300px;}
  .toolbar{bottom:8px;gap:6px;}
  .tb-btn{width:40px;height:40px;font-size:17px;}
  #touch-controls{display:block;}
  #controls-help{display:none !important;}
}
@media(hover:none) and (pointer:coarse){
  #touch-controls{display:block;}
}
</style>
</head>

<div id="start-screen">

/* ============================= SIMPLEX NOISE ============================= */
class SimplexNoise {
  constructor(seed = 0) {
    this.p = new Uint8Array(512);
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    let s = seed;
    for (let i = 255; i > 0; i--) {
      s = (s * 16807 + 0) % 2147483647;
      const j = s % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) this.p[i] = p[i & 255];
  }
  noise2D(x, y) {
    const F2 = 0.5 * (Math.sqrt(3) - 1), G2 = (3 - Math.sqrt(3)) / 6;
    const s = (x + y) * F2;
    const i = Math.floor(x + s), j = Math.floor(y + s);
    const t = (i + j) * G2;
    const x0 = x - (i - t), y0 = y - (j - t);
    const i1 = x0 > y0 ? 1 : 0, j1 = x0 > y0 ? 0 : 1;
    const x1 = x0 - i1 + G2, y1 = y0 - j1 + G2;
    const x2 = x0 - 1 + 2 * G2, y2 = y0 - 1 + 2 * G2;
    const ii = i & 255, jj = j & 255;
    const grad = (hash, gx, gy) => {
      const h = hash & 7, u = h < 4 ? gx : gy, v = h < 4 ? gy : gx;
      return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
    };
    let n0 = 0, n1 = 0, n2 = 0;
    let t0 = 0.5 - x0 * x0 - y0 * y0;
    if (t0 >= 0) { t0 *= t0; n0 = t0 * t0 * grad(this.p[ii + this.p[jj]], x0, y0); }
    let t1 = 0.5 - x1 * x1 - y1 * y1;
    if (t1 >= 0) { t1 *= t1; n1 = t1 * t1 * grad(this.p[ii + i1 + this.p[jj + j1]], x1, y1); }
    let t2 = 0.5 - x2 * x2 - y2 * y2;
    if (t2 >= 0) { t2 *= t2; n2 = t2 * t2 * grad(this.p[ii + 1 + this.p[jj + 1]], x2, y2); }
    return 70 * (n0 + n1 + n2);
  }
  fbm(x, y, octaves = 4, lacunarity = 2, gain = 0.5) {
    let sum = 0, amp = 1, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) { sum += this.noise2D(x * freq, y * freq) * amp; max += amp; amp *= gain; freq *= lacunarity; }
    return sum / max;
  }
}

const waterUniforms = {

const waterVS = `
  uniform float uTime; varying vec3 vWorldPos; varying vec3 vNormal;
  vec3 gw(vec3 p, float s, float wl, vec2 d, float sp){
    float k=6.2831853/wl; float c=sqrt(9.8/k); float a=s/k; vec2 dn=normalize(d);
    float f=k*(dot(dn,p.xz)-c*sp*uTime);
    return vec3(dn.x*a*cos(f), a*sin(f), dn.y*a*cos(f));
  }
  void main(){
    vec3 pos=position;
    pos += gw(pos,0.12,45.0,vec2(1,.3),1.0) + gw(pos,0.08,28.0,vec2(.3,1),.8)
         + gw(pos,0.06,16.0,vec2(-.5,.7),1.2) + gw(pos,0.04,9.0,vec2(.7,-.4),1.5);
    vWorldPos = (modelMatrix*vec4(pos,1.0)).xyz;
    float e=0.5; vec3 pX=position+vec3(e,0,0); vec3 pZ=position+vec3(0,0,e);
    pX += gw(pX,.12,45.,vec2(1,.3),1.) + gw(pX,.08,28.,vec2(.3,1),.8) + gw(pX,.06,16.,vec2(-.5,.7),1.2) + gw(pX,.04,9.,vec2(.7,-.4),1.5);
    pZ += gw(pZ,.12,45.,vec2(1,.3),1.) + gw(pZ,.08,28.,vec2(.3,1),.8) + gw(pZ,.06,16.,vec2(-.5,.7),1.2) + gw(pZ,.04,9.,vec2(.7,-.4),1.5);
    vNormal = normalize(cross(pZ-pos, pX-pos));
    gl_Position = projectionMatrix*modelViewMatrix*vec4(pos,1.0);
  }`;
const waterFS = `
  uniform float uTime; uniform vec3 uSunDir; uniform vec3 uCamPos;
  varying vec3 vWorldPos; varying vec3 vNormal;
  void main(){
    vec3 N=normalize(vNormal); vec3 V=normalize(uCamPos-vWorldPos); vec3 L=normalize(uSunDir);
    float fresnel = pow(1.0-max(dot(N,V),0.0),3.5); fresnel = mix(0.04,0.7,fresnel);
    vec3 deep=vec3(0.04,0.16,0.28); vec3 shallow=vec3(0.06,0.45,0.42);
    vec3 wc = mix(shallow, deep, fresnel);
    float NdL = max(dot(N,L),0.0);
    vec3 diff = wc*(0.45+0.55*NdL);
    vec3 H=normalize(L+V); float spec=pow(max(dot(N,H),0.0),400.0);
    vec3 specC = vec3(1.0,0.95,0.8)*spec*1.2;
    vec3 R=reflect(-V,N); float er=pow(max(R.y*0.5+0.5,0.0),0.5);
    vec3 refl = mix(vec3(0.5,0.7,0.9),vec3(0.18,0.38,0.68),er)*fresnel;
    float sss = pow(max(dot(V,-L+N*0.3),0.0),3.0)*0.25;
    vec3 sub = vec3(0.0,0.5,0.4)*sss;
    float wh = vWorldPos.y;
    float foam = smoothstep(1.0,1.6,wh)*0.3;
    float fx=vWorldPos.x*0.13+uTime*0.07, fz=vWorldPos.z*0.13+uTime*0.05;
    float fn = sin(fx*3.7+fz*2.1)*sin(fz*4.3-fx*1.9)+sin(fx*7.1-fz*5.3+uTime*0.1)*0.5;
    foam += smoothstep(0.5,0.85,fn*0.3+0.5)*smoothstep(0.5,1.2,wh)*0.2;
    vec3 color = diff*(1.0-fresnel)+refl+specC+sub;
    color = mix(color,vec3(0.9,0.95,1.0),foam*0.35);
    color = pow(color,vec3(1.0/2.2));
    gl_FragColor = vec4(color,1.0);
  }`;

/* ============================= ISLANDS =================================== */
const islandGroup = new THREE.Group();

const matTrunk = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
const matPalm = new THREE.MeshLambertMaterial({ color: 0x4a9e3f });
const matRock = new THREE.MeshLambertMaterial({ color: 0x7a7a7a });

function hashChunk(cx, cz) {
  let h = G.seed;
  h = ((h << 5) - h + cx * 374761393) | 0;
  h = ((h << 5) - h + cz * 668265263) | 0;
  h = ((h ^ (h >> 13)) * 1274126177) | 0;
  return (h >>> 0) / 4294967296;
}

function createPalmTree(x, y, z) {
  const g = new THREE.Group();
  const height = 4 + Math.random() * 3;
  const pts = [];
  for (let i = 0; i <= 8; i++) { const t = i / 8; pts.push(new THREE.Vector3(Math.sin(t * 1.5) * 0.7, t * height, Math.cos(t * 0.5) * 0.25)); }
  const trunk = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 6, 0.13, 5, false), matTrunk);
  trunk.castShadow = true; g.add(trunk);
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 + Math.random() * 0.5;
    const lg = new THREE.PlaneGeometry(0.5, 2 + Math.random(), 1, 3);
    const lp = lg.attributes.position;
    for (let v = 0; v < lp.count; v++) { const vy = lp.getY(v); lp.setZ(v, lp.getZ(v) - (vy * vy) * 0.4); }
    lp.needsUpdate = true; lg.computeVertexNormals();
    const leaf = new THREE.Mesh(lg, matPalm);
    leaf.position.set(Math.sin(a) * 0.3, height, Math.cos(a) * 0.3);
    leaf.rotation.set(0, a, Math.cos(a) * 0.8); leaf.castShadow = true; g.add(leaf);
  }
  g.position.set(x, y, z); g.rotation.y = Math.random() * Math.PI * 2; return g;
}

function createRock(x, y, z, s) {
  const geo = new THREE.DodecahedronGeometry(s, 1);
  const p = geo.attributes.position;
  for (let i = 0; i < p.count; i++) { p.setX(i, p.getX(i) + (Math.random() - 0.5) * s * 0.3); p.setY(i, p.getY(i) * (0.5 + Math.random() * 0.5)); p.setZ(i, p.getZ(i) + (Math.random() - 0.5) * s * 0.3); }
  p.needsUpdate = true; geo.computeVertexNormals();
  const r = new THREE.Mesh(geo, matRock); r.position.set(x, y, z); r.castShadow = true; r.receiveShadow = true; return r;
}

function generateIsland(cx, cz) {
  const key = `${cx},${cz}`;
  if (G.chunks.has(key)) return;
  G.chunks.set(key, true);
  const h = hashChunk(cx, cz);
  if (h > ISLAND_CHANCE) return;

  const worldX = cx * CHUNK_SIZE, worldZ = cz * CHUNK_SIZE;
  const islandRadius = 15 + h * 55;
  const islandHeight = 4 + h * 14;
  const group = new THREE.Group();
  group.userData = { cx, cz, worldX, worldZ, radius: islandRadius };

  const seg = Math.max(16, Math.floor(islandRadius * (isMobile ? 1 : 1.5)));
  const terrainGeo = new THREE.PlaneGeometry(islandRadius * 2, islandRadius * 2, seg, seg);
  terrainGeo.rotateX(-Math.PI / 2);
  const positions = terrainGeo.attributes.position;
  const colors = new Float32Array(positions.count * 3);

  for (let i = 0; i < positions.count; i++) {
    const px = positions.getX(i), pz = positions.getZ(i);
    const dist = Math.sqrt(px * px + pz * pz) / islandRadius;
    const nv = noise.fbm((worldX + px) * 0.02, (worldZ + pz) * 0.02, 4);
    const falloff = Math.max(0, 1 - dist * dist);
    const ht = Math.max(0, (nv * 0.5 + 0.5) * islandHeight * falloff * falloff);
    positions.setY(i, ht + 0.15);

    const nh = ht / islandHeight;
    let r, g, b;
    if (nh < 0.06) { r = 0.92; g = 0.85; b = 0.56; }
    else if (nh < 0.15) { r = 0.88; g = 0.80; b = 0.48; }
    else if (nh < 0.55) { const t = (nh - 0.15) / 0.4; r = 0.30 - t * 0.08; g = 0.56 - t * 0.04; b = 0.26; }
    else { r = 0.52; g = 0.52; b = 0.50; }
    colors[i * 3] = r; colors[i * 3 + 1] = g; colors[i * 3 + 2] = b;
  }
  positions.needsUpdate = true;
  terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  terrainGeo.computeVertexNormals();

  const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshLambertMaterial({ vertexColors: true }));
  terrain.receiveShadow = true; terrain.castShadow = true;
  terrain.position.set(worldX, SEA_LEVEL, worldZ);
  terrain.renderOrder = 1;
  group.add(terrain);

  const ln = new SimplexNoise(cx * 1000 + cz);
  const treeCount = Math.floor(4 + h * (isMobile ? 15 : 25));
  for (let t = 0; t < treeCount; t++) {
    const a = ln.noise2D(t * 0.7, 0) * Math.PI * 2;
    const rad = (0.2 + Math.abs(ln.noise2D(t * 0.3, 1)) * 0.55) * islandRadius;
    const tx = Math.cos(a) * rad, tz = Math.sin(a) * rad;
    const d = Math.sqrt(tx * tx + tz * tz) / islandRadius;
    if (d > 0.8) continue;
    const ff = Math.max(0, 1 - d * d);
    const nv = noise.fbm((worldX + tx) * 0.02, (worldZ + tz) * 0.02, 4);
    const ty = Math.max(0, (nv * 0.5 + 0.5) * islandHeight * ff * ff);
    if (ty > 0.8 && ty < islandHeight * 0.65) group.add(createPalmTree(worldX + tx, SEA_LEVEL + ty + 0.15, worldZ + tz));
  }

  const rockCount = Math.floor(2 + h * 8);
  for (let r = 0; r < rockCount; r++) {
    const a = ln.noise2D(r * 0.5, 10) * Math.PI * 2;
    const rad = (0.3 + Math.abs(ln.noise2D(r * 0.4, 11)) * 0.65) * islandRadius;
    const rx = Math.cos(a) * rad, rz = Math.sin(a) * rad;
    const d = Math.sqrt(rx * rx + rz * rz) / islandRadius;
    const ff = Math.max(0, 1 - d * d);
    const nv = noise.fbm((worldX + rx) * 0.02, (worldZ + rz) * 0.02, 4);
    const ry = Math.max(0, (nv * 0.5 + 0.5) * islandHeight * ff * ff);
    group.add(createRock(worldX + rx, SEA_LEVEL + ry + 0.15, worldZ + rz, 0.4 + Math.random() * 1.2));
  }

  if (ln.noise2D(cx, cz) > 0.2) {
    const items = ['wood', 'cloth', 'iron', 'gold', 'rum', 'gunpowder'];
    const fi = { type: items[Math.floor(Math.abs(ln.noise2D(cx + 5, cz + 5)) * items.length)],
      x: worldX + ln.noise2D(cx, cz + 1) * islandRadius * 0.4,
      z: worldZ + ln.noise2D(cx + 1, cz) * islandRadius * 0.4, collected: false };
    G.floatingItems.push(fi);
    const crate = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), new THREE.MeshLambertMaterial({ color: 0x8b6914 }));
    crate.position.set(fi.x, SEA_LEVEL + 1.5, fi.z); crate.castShadow = true; crate.userData.floatItem = fi;
    group.add(crate);
  }

  islandGroup.add(group);
  G.islands.push(group.userData);
}

function updateChunks() {
  const pcx = Math.floor(G.player.x / CHUNK_SIZE), pcz = Math.floor(G.player.z / CHUNK_SIZE);
  for (let dx = -RENDER_DIST; dx <= RENDER_DIST; dx++)
    for (let dz = -RENDER_DIST; dz <= RENDER_DIST; dz++)
      generateIsland(pcx + dx, pcz + dz);
}

function buildShipMesh(type, parts, flagColor, shipName) {
  const g = new THREE.Group(), spec = SHIP_TYPES[type];
  let hc = 0x6b3a1f;
  if (parts.hull === 'reinforced') hc = 0x4a4a4a;
  else if (parts.hull === 'darkwood') hc = 0x2a1a0a;

  const hw = spec.hullW / 2, hl = spec.hullLen / 2;
  const shape = new THREE.Shape();
  shape.moveTo(-hw, -hl); shape.lineTo(-hw * 1.1, -hl * 0.3); shape.lineTo(-hw, hl * 0.5);
  shape.lineTo(-hw * 0.6, hl * 0.9); shape.lineTo(0, hl); shape.lineTo(hw * 0.6, hl * 0.9);
  shape.lineTo(hw, hl * 0.5); shape.lineTo(hw * 1.1, -hl * 0.3); shape.lineTo(hw, -hl);
  shape.lineTo(0, -hl * 1.05); shape.closePath();

  const hull = new THREE.Mesh(
    new THREE.ExtrudeGeometry(shape, { depth: spec.hullH, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1, bevelSegments: 2 }),
    new THREE.MeshPhongMaterial({ color: hc, shininess: 20 })
  );
  hull.geometry.rotateX(-Math.PI / 2); hull.castShadow = true; hull.receiveShadow = true;
  hull.position.y = -spec.hullH * 0.3; g.add(hull);

  const dg = new THREE.PlaneGeometry(spec.hullW * 0.85, spec.hullLen * 0.9); dg.rotateX(-Math.PI / 2);
  const deck = new THREE.Mesh(dg, new THREE.MeshLambertMaterial({ color: 0xa0825a }));
  deck.position.y = spec.hullH * 0.65; deck.receiveShadow = true; g.add(deck);

  const rg = new THREE.BoxGeometry(0.08, 0.4, spec.hullLen * 0.8);
  const rm = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
  const rl = new THREE.Mesh(rg, rm); rl.position.set(-spec.hullW * 0.42, spec.hullH * 0.85, 0); g.add(rl);
  const rr = new THREE.Mesh(rg.clone(), rm); rr.position.set(spec.hullW * 0.42, spec.hullH * 0.85, 0); g.add(rr);

  const stern = new THREE.Mesh(new THREE.BoxGeometry(spec.hullW * 0.9, spec.hullH * 0.8, spec.hullLen * 0.2),
    new THREE.MeshPhongMaterial({ color: 0x5a3010 }));
  stern.position.set(0, spec.hullH * 0.4, -spec.hullLen * 0.42); stern.castShadow = true; g.add(stern);

  let sc = 0xf5f0e0;
  if (parts.sail === 'silk') sc = 0xfff8e8;
  else if (parts.sail === 'war') sc = 0x2a2a2a;

  for (let m = 0; m < spec.masts; m++) {
    const mH = spec.hullLen * 0.7, mZ = (m - (spec.masts - 1) / 2) * (spec.hullLen * 0.3);
    const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.11, mH, 5), rm);
    mast.position.set(0, spec.hullH * 0.6 + mH / 2, mZ); mast.castShadow = true; g.add(mast);

    const sW = spec.hullW * 1.2, sH = mH * 0.55;
    const sg = new THREE.PlaneGeometry(sW, sH, 6, 6);
    const sail = new THREE.Mesh(sg, new THREE.MeshLambertMaterial({ color: sc, side: THREE.DoubleSide }));
    sail.position.set(0, spec.hullH * 0.6 + mH * 0.6, mZ + 0.3);
    sail.userData.isSail = true; sail.userData.basePositions = sg.attributes.position.array.slice();
    sail.castShadow = true; g.add(sail);

    const yg = new THREE.CylinderGeometry(0.04, 0.04, sW + 0.4, 4); yg.rotateZ(Math.PI / 2);
    const yard = new THREE.Mesh(yg, rm); yard.position.set(0, spec.hullH * 0.6 + mH * 0.85, mZ); g.add(yard);
  }

  if (spec.bowStyle === 'blunt') {
    const bowGeo = new THREE.BoxGeometry(spec.hullW * 0.7, spec.hullH * 0.6, spec.hullLen * 0.08);
    const bow = new THREE.Mesh(bowGeo, new THREE.MeshPhongMaterial({ color: hc, shininess: 15 }));
    bow.position.set(0, spec.hullH * 0.2, spec.hullLen * 0.48); bow.castShadow = true; g.add(bow);
  }

  if (type === 'warship') {
    const qd = new THREE.BoxGeometry(spec.hullW * 0.85, spec.hullH * 1.0, spec.hullLen * 0.22);
    const quarter = new THREE.Mesh(qd, new THREE.MeshPhongMaterial({ color: 0x4a2a10, shininess: 15 }));
    quarter.position.set(0, spec.hullH * 0.7, -spec.hullLen * 0.35); quarter.castShadow = true; g.add(quarter);
    const wg = new THREE.CylinderGeometry(0.06, 0.06, spec.hullW * 0.6, 4); wg.rotateZ(Math.PI / 2);
    for (let wi = 0; wi < 3; wi++) {
      const win = new THREE.Mesh(wg, new THREE.MeshBasicMaterial({ color: 0x888844 }));
      win.position.set(0, spec.hullH * 0.3, -spec.hullLen * (0.1 + wi * 0.12)); g.add(win);
    }
  }

  if (type === 'galleon' || type === 'warship') {
    const cb = new THREE.BoxGeometry(spec.hullW * 0.55, spec.hullH * 0.3, spec.hullLen * 0.08);
    const crows = new THREE.Mesh(cb, rm);
    crows.position.set(0, spec.hullH * 0.6 + spec.hullLen * 0.7 * 0.95, 0); g.add(crows);
  }

  if (parts.cannon && parts.cannon !== 'none') {
    const cc = spec.cannonSlots || 2;
    const cg = new THREE.CylinderGeometry(0.1, 0.15, 1.2, 6); cg.rotateZ(Math.PI / 2);
    const cm = new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 60 });
    for (let c = 0; c < cc; c++) {
      const side = c % 2 === 0 ? 1 : -1, idx = Math.floor(c / 2);
      const cn = new THREE.Mesh(cg, cm);
      cn.position.set(side * spec.hullW * 0.5, spec.hullH * 0.6, (idx - Math.floor(cc / 4) + 0.5) * 1.8);
      cn.castShadow = true; g.add(cn);
    }
  }

  if (parts.figurehead && parts.figurehead !== 'none') {
    const fg = new THREE.ConeGeometry(0.3, 1.2, 6); fg.rotateX(Math.PI * 0.3);
    const fh = new THREE.Mesh(fg, new THREE.MeshPhongMaterial({ color: 0xd4a848, shininess: 40 }));
    fh.position.set(0, spec.hullH * 0.3, spec.hullLen * 0.55); fh.castShadow = true; g.add(fh);
  }

  if (flagColor) {
    const fc = document.createElement('canvas'); fc.width = 64; fc.height = 48;
    const ctx = fc.getContext('2d'); ctx.fillStyle = flagColor; ctx.fillRect(0, 0, 64, 48);
    ctx.fillStyle = '#000'; ctx.font = '28px serif'; ctx.fillText('\u2620', 18, 36);
    const fmesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.7),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(fc), side: THREE.DoubleSide }));

}

function buildCrewMeshes(group, crewList, shipType) {

    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, member.outfit === 'coat' ? 0.5 : 0.4, 4, 5), new THREE.MeshLambertMaterial({ color: bc }));

      capHat.position.y = 0.86; cg.add(capHat);

      hood.position.y = 0.73; hood.scale.set(1, 0.8, 1.1); cg.add(hood);
    }

    if (member.parrot) {
      const pBody = new THREE.Mesh(new THREE.SphereGeometry(0.06, 5, 5), new THREE.MeshLambertMaterial({ color: 0x22aa22 }));
      pBody.position.set(0.2, 0.65, 0); cg.add(pBody);
      const pHead = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), new THREE.MeshLambertMaterial({ color: 0xff3333 }));

      beak.position.set(0.24, 0.72, 0); beak.rotation.z = -Math.PI / 2; cg.add(beak);

    else if (member.task === 'sails') { px = (Math.random() - 0.5) * spec.hullW * 0.4; pz = spec.hullLen * 0.1; }
    else if (member.task === 'cannons') { px = (idx % 2 === 0 ? 1 : -1) * spec.hullW * 0.35; pz = (idx - crewList.length / 2) * 1.2; }
    else if (member.task === 'lookout') { px = 0; pz = spec.hullLen * 0.35; }
    else { px = (Math.random() - 0.5) * spec.hullW * 0.5; pz = (Math.random() - 0.5) * spec.hullLen * 0.4; }
    cg.position.set(px, spec.hullH * 0.65, pz);

let shipNameSprite = null;

function makeTextSprite(text, color = '#d4a848') {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 64);
  ctx.fillStyle = 'rgba(10,6,4,0.6)';
  ctx.roundRect(4, 8, 248, 48, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,60,0.5)'; ctx.lineWidth = 1;
  ctx.roundRect(4, 8, 248, 48, 8); ctx.stroke();
  ctx.font = 'bold 22px Georgia, serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(6, 1.5, 1);
  return sprite;
}

function spawnNPCs() {
  for (let i = 0; i < 3; i++) {
    const a = Math.random() * Math.PI * 2, d = 150 + Math.random() * 300;
    const npc = {
      x: G.player.x + Math.cos(a) * d, z: G.player.z + Math.sin(a) * d,
      rotation: Math.random() * Math.PI * 2, speed: 2 + Math.random() * 3,
      health: 60 + Math.random() * 40, type: ['cutter','sloop','brigantine','galleon','warship'][Math.floor(Math.random() * 5)],
      name: ['Sea Phantom', 'Red Tide', 'Storm Chaser', 'Bone Rattler', 'Shadow Wave'][Math.floor(Math.random() * 5)],
      wanderAngle: Math.random() * Math.PI * 2, wanderTimer: 5 + Math.random() * 10
    };
    const mesh = buildShipMesh(npc.type, { hull: 'darkwood', sail: 'war', cannon: 'light', figurehead: 'skull' }, '#aa2222', npc.name);
    npc.mesh = mesh; scene.add(mesh);
    G.npcs.push(npc);
  }
}

function updateNPCs(dt) {
  G.npcs.forEach(npc => {
    npc.wanderTimer -= dt;
    if (npc.wanderTimer <= 0) {
      npc.wanderAngle += (Math.random() - 0.5) * 1.5;
      npc.wanderTimer = 4 + Math.random() * 8;
    }
    const targetRot = npc.wanderAngle;
    let diff = targetRot - npc.rotation;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    npc.rotation += diff * 0.5 * dt;
    npc.x += Math.sin(npc.rotation) * npc.speed * dt;
    npc.z += Math.cos(npc.rotation) * npc.speed * dt;
    if (npc.mesh) {
      npc.mesh.position.set(npc.x, SEA_LEVEL + 0.3 + Math.sin(G.time * 1.3 + npc.x) * 0.3, npc.z);
      npc.mesh.rotation.y = npc.rotation;
      npc.mesh.rotation.z = Math.sin(G.time * 0.7 + npc.z) * 0.04;
    }
  });
}

/* ============================== NETWORK =================================== */
let ws = null;
function getServerUrl() {
  const p = new URLSearchParams(location.search), ex = p.get('server');
  if (ex) return ex;
  return `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`;
}
function connectToServer() {
  const url = getServerUrl();
  try { ws = new WebSocket(url); } catch (e) { return; }
  ws.onopen = () => notify('Connected to server');
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'init':
        G.myId = msg.id; G.seed = msg.seed; noise = new SimplexNoise(G.seed);
        if (msg.player) { G.player.x = msg.player.x; G.player.z = msg.player.z; G.player.color = msg.player.color; G.player.name = msg.player.name; }
        if (msg.players) msg.players.forEach(p => G.otherPlayers.set(p.id, p));
        break;
      case 'player_join': G.otherPlayers.set(msg.player.id, msg.player); notify(`${msg.player.name} joined`); break;
      case 'player_leave': G.otherPlayers.delete(msg.id); if (otherShipGroups.has(msg.id)) { scene.remove(otherShipGroups.get(msg.id)); otherShipGroups.delete(msg.id); } break;
      case 'state': msg.players.forEach(p => { if (p.id !== G.myId) { const ex = G.otherPlayers.get(p.id); if (ex) Object.assign(ex, p); } }); break;
      case 'ship_update': { const p = G.otherPlayers.get(msg.id); if (p) { p.shipType = msg.shipType; p.shipParts = msg.shipParts; if (otherShipGroups.has(msg.id)) { scene.remove(otherShipGroups.get(msg.id)); otherShipGroups.delete(msg.id); } } break; }
      case 'chat': addChatMessage(msg.name, msg.text); break;
      case 'cannonball': fireCannonball(msg.x, msg.z, msg.dx, msg.dz); break;
    }
  };
  ws.onerror = () => {};
  ws.onclose = () => { setTimeout(connectToServer, 3000); };
}
function sendUpdate() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'update', x: G.player.x, z: G.player.z, rotation: G.player.rotation, speed: G.player.speed, health: G.player.health }));
}

/* Touch joystick */
const joyZone = document.getElementById('joystick-zone');
const joyKnob = document.getElementById('joystick-knob');
let joyTouchId = null;
let joyCenter = { x: 0, y: 0 };

joyZone?.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0]; joyTouchId = t.identifier;
  const rect = joyZone.getBoundingClientRect();
  joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  G.touch.active = true;
}, { passive: false });

window.addEventListener('touchmove', e => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier === joyTouchId) {
      const dx = t.clientX - joyCenter.x, dy = t.clientY - joyCenter.y;
      const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 50);
      const angle = Math.atan2(dx, dy);
      G.touch.joyX = (dx / 50); G.touch.joyY = (dy / 50);
      G.touch.joyX = Math.max(-1, Math.min(1, G.touch.joyX));
      G.touch.joyY = Math.max(-1, Math.min(1, G.touch.joyY));
      const kx = (dx / 50) * 28, ky = (dy / 50) * 28;
      joyKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
      e.preventDefault();
    }
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (pinchDist > 0) { G.camera.targetZoom = Math.max(15, Math.min(120, G.camera.targetZoom - (d - pinchDist) * 0.15)); }
    pinchDist = d; e.preventDefault();
  }
}, { passive: false });

window.addEventListener('touchend', e => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joyTouchId) {
      joyTouchId = null; G.touch.joyX = 0; G.touch.joyY = 0; G.touch.active = false;
      joyKnob.style.transform = 'translate(-50%,-50%)';
    }
  }
  if (e.touches.length < 2) pinchDist = 0;
});

document.getElementById('touch-fire')?.addEventListener('touchstart', e => { e.preventDefault(); doFire(); }, { passive: false });
document.getElementById('touch-zoom-in')?.addEventListener('touchstart', e => { e.preventDefault(); G.camera.targetZoom = Math.max(15, G.camera.targetZoom - 8); }, { passive: false });
document.getElementById('touch-zoom-out')?.addEventListener('touchstart', e => { e.preventDefault(); G.camera.targetZoom = Math.min(120, G.camera.targetZoom + 8); }, { passive: false });

/* ============================== ACTIONS =================================== */
function doFire() {
  const spec = SHIP_TYPES[G.player.shipType];
  const cp = SHIP_PARTS.cannon.find(c => c.id === G.player.shipParts.cannon);
  if (!cp || cp.damage <= 0) { notify('No cannons equipped!'); return; }
  if (G.cannonCooldown > 0) { notify(`Reloading... ${G.cannonCooldown.toFixed(1)}s`); return; }

  G.cannonCooldown = 2.0;
  G.crewReloading = true;
  G.crewReloadTimer = 1.5;

  const rot = G.player.rotation;
  const sinR = Math.sin(rot), cosR = Math.cos(rot);
  const cc = spec.cannonSlots || 2;
  const shipY = playerShipGroup.position.y;
  const cannonY = shipY + spec.hullH * 0.6;

  for (let c = 0; c < cc; c++) {
    const side = c % 2 === 0 ? 1 : -1;
    const idx = Math.floor(c / 2);
    const localZ = (idx - Math.floor(cc / 4) + 0.5) * 1.5;
    const localX = side * (spec.hullW * 0.55 + 0.6);

    const wx = G.player.x + localX * cosR - localZ * sinR;
    const wz = G.player.z + localX * sinR + localZ * cosR;

    const dirX = side * cosR;
    const dirZ = side * sinR;

    fireCannonball(wx, wz, dirX, dirZ, cannonY);
    if (ws?.readyState === 1) {
      ws.send(JSON.stringify({ type: 'cannonball', x: wx, z: wz, dx: dirX, dz: dirZ }));
    }
  }
}

function doAnchor() {
  G.player.anchored = !G.player.anchored;
  document.getElementById('anchor-status').style.display = G.player.anchored ? 'block' : 'none';
  notify(G.player.anchored ? 'Anchor dropped' : 'Anchor raised');
}

/* ============================== COMPASS ================================== */
const compCanvas = document.getElementById('compass-canvas');
const compCtx = compCanvas.getContext('2d');

function drawCompass() {
  const ctx = compCtx, s = 180, cx = s / 2, cy = s / 2, r = cx - 8;
  ctx.clearRect(0, 0, s, s);
  ctx.save(); ctx.translate(cx, cy);

  ctx.beginPath(); ctx.arc(0, 0, r + 5, 0, Math.PI * 2);
  const rim = ctx.createRadialGradient(0, 0, r - 2, 0, 0, r + 5);
  rim.addColorStop(0, '#6a4a1a'); rim.addColorStop(0.5, '#8a6a2a'); rim.addColorStop(1, '#4a3010');
  ctx.fillStyle = rim; ctx.fill();

  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
  const face = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 0, 0, 0, r);
  face.addColorStop(0, '#e8d8b8'); face.addColorStop(0.4, '#d8c8a0'); face.addColorStop(0.8, '#c0a878'); face.addColorStop(1, '#a08858');
  ctx.fillStyle = face; ctx.fill();
  ctx.strokeStyle = '#6a4a1a'; ctx.lineWidth = 2.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(0, 0, r - 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,70,30,0.4)'; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r * 0.72, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100,70,30,0.25)'; ctx.lineWidth = 0.5; ctx.stroke();

  ctx.save(); ctx.rotate(-G.player.rotation);

  for (let i = 0; i < 32; i++) {
    const a = (i / 32) * Math.PI * 2 - Math.PI / 2;
    const outer = r - 6, inner = i % 8 === 0 ? r - 18 : i % 4 === 0 ? r - 14 : i % 2 === 0 ? r - 11 : r - 9;
    ctx.beginPath(); ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
    ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
    ctx.strokeStyle = i % 8 === 0 ? '#3a2810' : i % 4 === 0 ? 'rgba(60,40,20,0.7)' : 'rgba(80,60,30,0.35)';
    ctx.lineWidth = i % 8 === 0 ? 2 : 1; ctx.stroke();
  }

  function drawStar(points, outerR, innerR, color, stroke) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
      const pr = i % 2 === 0 ? outerR : innerR;
      if (i === 0) ctx.moveTo(Math.cos(a) * pr, Math.sin(a) * pr);
      else ctx.lineTo(Math.cos(a) * pr, Math.sin(a) * pr);
    }
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.8; ctx.stroke(); }
  }

  drawStar(16, r * 0.55, r * 0.15, 'rgba(80,60,30,0.12)', 'rgba(80,60,30,0.2)');
  drawStar(8, r * 0.5, r * 0.12, 'rgba(80,60,30,0.08)');

  const nr = r * 0.52;
  ctx.beginPath(); ctx.moveTo(0, -nr); ctx.lineTo(-nr * 0.14, -nr * 0.1); ctx.lineTo(0, nr * 0.08); ctx.closePath();
  ctx.fillStyle = '#b82020'; ctx.fill(); ctx.strokeStyle = '#7a1010'; ctx.lineWidth = 0.7; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -nr); ctx.lineTo(nr * 0.14, -nr * 0.1); ctx.lineTo(0, nr * 0.08); ctx.closePath();
  ctx.fillStyle = '#d83030'; ctx.fill(); ctx.strokeStyle = '#7a1010'; ctx.lineWidth = 0.7; ctx.stroke();

  ctx.beginPath(); ctx.moveTo(0, nr); ctx.lineTo(-nr * 0.12, nr * 0.1); ctx.lineTo(0, -nr * 0.06); ctx.closePath();
  ctx.fillStyle = 'rgba(40,30,15,0.7)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(0, nr); ctx.lineTo(nr * 0.12, nr * 0.1); ctx.lineTo(0, -nr * 0.06); ctx.closePath();
  ctx.fillStyle = 'rgba(60,45,20,0.7)'; ctx.fill();

  ctx.beginPath(); ctx.moveTo(nr, 0); ctx.lineTo(nr * 0.1, -nr * 0.12); ctx.lineTo(-nr * 0.06, 0); ctx.closePath();
  ctx.fillStyle = 'rgba(50,35,15,0.6)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(nr, 0); ctx.lineTo(nr * 0.1, nr * 0.12); ctx.lineTo(-nr * 0.06, 0); ctx.closePath();
  ctx.fillStyle = 'rgba(70,50,25,0.6)'; ctx.fill();

  ctx.beginPath(); ctx.moveTo(-nr, 0); ctx.lineTo(-nr * 0.1, -nr * 0.12); ctx.lineTo(nr * 0.06, 0); ctx.closePath();
  ctx.fillStyle = 'rgba(50,35,15,0.6)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-nr, 0); ctx.lineTo(-nr * 0.1, nr * 0.12); ctx.lineTo(nr * 0.06, 0); ctx.closePath();
  ctx.fillStyle = 'rgba(70,50,25,0.6)'; ctx.fill();

  const labels = [
    { t: 'N', a: -Math.PI / 2, c: '#991111', s: 15, b: true },
    { t: 'E', a: 0, c: '#3a2810', s: 12, b: false },
    { t: 'S', a: Math.PI / 2, c: '#3a2810', s: 12, b: false },
    { t: 'W', a: Math.PI, c: '#3a2810', s: 12, b: false }
  ];
  labels.forEach(l => {
    const dr = r * 0.78;
    ctx.font = `${l.b ? 'bold ' : ''}${l.s}px "Georgia",serif`;
    ctx.fillStyle = l.c; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l.t, Math.cos(l.a) * dr, Math.sin(l.a) * dr);
  });

  const wa = G.wind.angle - Math.PI / 2;
  const wr = r * 0.6;
  ctx.save(); ctx.rotate(wa);
  ctx.beginPath(); ctx.moveTo(wr, 0); ctx.lineTo(wr - 12, -5); ctx.lineTo(wr - 8, 0); ctx.lineTo(wr - 12, 5); ctx.closePath();
  ctx.fillStyle = 'rgba(50,130,200,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(80,160,230,0.9)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  ctx.restore();

  ctx.beginPath(); ctx.moveTo(0, -r + 18); ctx.lineTo(-5, -r + 28); ctx.lineTo(5, -r + 28); ctx.closePath();
  ctx.fillStyle = '#e8c030'; ctx.fill(); ctx.strokeStyle = '#a08020'; ctx.lineWidth = 1; ctx.stroke();

  ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2);
  const pin = ctx.createRadialGradient(0, 0, 0, 0, 0, 5);
  pin.addColorStop(0, '#f0d060'); pin.addColorStop(1, '#8a6020');
  ctx.fillStyle = pin; ctx.fill();
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 1; ctx.stroke();

  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
  const gloss = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
  gloss.addColorStop(0, 'rgba(255,255,255,0.12)'); gloss.addColorStop(0.5, 'rgba(255,255,255,0.03)'); gloss.addColorStop(1, 'rgba(0,0,0,0.05)');
  ctx.fillStyle = gloss; ctx.fill();

  ctx.restore();
  ctx.fillStyle = '#6a5030'; ctx.font = '10px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText(`Wind ${G.wind.speed.toFixed(0)}kn`, cx, s - 2);
}

/* ============================== MINIMAP ================================== */
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');
function drawMinimap() {
  const w = 180, h = 180, s = 0.15, cx = w / 2, cy = h / 2;
  mmCtx.fillStyle = '#0a1e3c'; mmCtx.fillRect(0, 0, w, h);
  islandGroup.children.forEach(g => {
    const d = g.userData; const sx = cx + (d.worldX - G.player.x) * s, sy = cy + (d.worldZ - G.player.z) * s;
    if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) return;
    mmCtx.fillStyle = '#4a8a3f'; mmCtx.beginPath(); mmCtx.arc(sx, sy, Math.max(3, d.radius * s), 0, Math.PI * 2); mmCtx.fill();
    mmCtx.fillStyle = '#e8d68c'; mmCtx.beginPath(); mmCtx.arc(sx, sy, Math.max(2, d.radius * s * 0.7), 0, Math.PI * 2); mmCtx.fill();
  });
  G.npcs.forEach(n => { const sx = cx + (n.x - G.player.x) * s, sy = cy + (n.z - G.player.z) * s; if (sx > 0 && sx < w && sy > 0 && sy < h) { mmCtx.fillStyle = '#cc3333'; mmCtx.beginPath(); mmCtx.arc(sx, sy, 3, 0, Math.PI * 2); mmCtx.fill(); } });
  G.otherPlayers.forEach(p => { const sx = cx + (p.x - G.player.x) * s, sy = cy + (p.z - G.player.z) * s; if (sx > 0 && sx < w && sy > 0 && sy < h) { mmCtx.fillStyle = p.color || '#44aaff'; mmCtx.beginPath(); mmCtx.arc(sx, sy, 3, 0, Math.PI * 2); mmCtx.fill(); } });
  mmCtx.fillStyle = '#ffdd44'; mmCtx.beginPath(); mmCtx.arc(cx, cy, 4, 0, Math.PI * 2); mmCtx.fill();
  mmCtx.strokeStyle = '#ffdd44'; mmCtx.lineWidth = 2; mmCtx.beginPath(); mmCtx.moveTo(cx, cy);
  mmCtx.lineTo(cx + Math.sin(G.player.rotation) * 8, cy + Math.cos(G.player.rotation) * 8); mmCtx.stroke();
}

/* ============================== GAME LOOP ================================ */
let lastTime = 0, sendTimer = 0;

function update(dt) {
  if (G.mode !== 'playing') return;
  G.time += dt; G.dt = dt;
  G.wind.angle += noise.noise2D(G.time * 0.01, 0) * 0.5 * dt;
  G.wind.speed = 4 + noise.noise2D(G.time * 0.02, 100) * 3;

  if (!G.player.anchored) {
    const spec = SHIP_TYPES[G.player.shipType];
    const sailPart = SHIP_PARTS.sail.find(s => s.id === G.player.shipParts.sail);
    const speedMult = spec.speed + (sailPart ? sailPart.speedBonus : 0);
    const windDot = Math.cos(G.wind.angle - G.player.rotation);
    const windEffect = Math.max(0.25, windDot * 0.35 + 0.65);

    let forward = 0, turn = 0;
    if (keys['w'] || keys['arrowup']) forward = 1;
    else if (keys['s'] || keys['arrowdown']) forward = -1;
    if (keys['a'] || keys['arrowleft']) turn = 1;
    else if (keys['d'] || keys['arrowright']) turn = -1;

    if (G.touch.active) {
      forward = -G.touch.joyY;
      turn = -G.touch.joyX;
    }

    if (forward > 0.1) G.player.speed = Math.min(G.player.speed + 4 * dt * speedMult * forward, 12 * speedMult);
    else if (forward < -0.1) G.player.speed = Math.max(G.player.speed - 6 * dt * Math.abs(forward), -3);
    else G.player.speed *= (1 - 0.8 * dt);
    if (Math.abs(G.player.speed) < 0.05) G.player.speed = 0;

    if (Math.abs(turn) > 0.1) G.player.rotation += turn * spec.turnRate * dt * Math.min(1, Math.abs(G.player.speed) * 0.3 + 0.3);

    const effectiveSpeed = G.player.speed * windEffect;
    G.player.x += Math.sin(G.player.rotation) * effectiveSpeed * dt;
    G.player.z += Math.cos(G.player.rotation) * effectiveSpeed * dt;
  }

  if (keys['q']) G.camera.targetYaw -= 1.5 * dt;
  if (keys['e']) G.camera.targetYaw += 1.5 * dt;
  G.camera.yaw += (G.camera.targetYaw - G.camera.yaw) * 4 * dt;

  if (!G.touch.active) {
    G.camera.offsetX *= (1 - 2 * dt);
    G.camera.offsetZ *= (1 - 2 * dt);
  }
  G.camera.zoom += (G.camera.targetZoom - G.camera.zoom) * 4 * dt;

  if (G.cannonCooldown > 0) G.cannonCooldown -= dt;
  if (G.crewReloading) {
    G.crewReloadTimer -= dt;
    if (G.crewReloadTimer <= 0) G.crewReloading = false;
  }

  updateChunks();
  updateNPCs(dt);

  playerShipGroup.position.set(G.player.x, SEA_LEVEL + 0.4 + Math.sin(G.time * 1.5) * 0.25, G.player.z);
  playerShipGroup.rotation.set(Math.sin(G.time * 1.2) * 0.02, G.player.rotation, Math.sin(G.time * 0.8) * 0.03);

  const relWind = G.wind.angle - G.player.rotation;
  const windPushZ = Math.cos(relWind);
  const windPushX = Math.sin(relWind);
  const windStr = G.wind.speed / 6;

  let targetSailAngle = relWind * 0.35;
  targetSailAngle = Math.max(-0.8, Math.min(0.8, targetSailAngle));
  let angleDiff = targetSailAngle - G.currentSailAngle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  G.currentSailAngle += angleDiff * 1.5 * dt;

  playerShipGroup.traverse(child => {
    if (child.userData.isSail && child.userData.basePositions) {
      child.rotation.y = G.currentSailAngle;
      const p = child.geometry.attributes.position, base = child.userData.basePositions;
      const billow = Math.abs(windPushZ) * windStr;
      for (let i = 0; i < p.count; i++) {
        const bx = base[i * 3], by = base[i * 3 + 1], bz = base[i * 3 + 2];
        const billowAmt = (1 - Math.abs(by) / 3) * 0.4 + 0.1;
        const flutter = Math.sin(G.time * 2.0 + by * 3 + bx * 1.5) * 0.025;
        p.setZ(i, bz + (windPushZ > 0 ? 1 : -1) * billowAmt * billow + flutter);
      }
      p.needsUpdate = true; child.geometry.computeVertexNormals();
    }
    if (child.userData.isFlag) child.rotation.y = Math.sin(G.time * 3) * 0.3;
    if (child.userData.isCrew) {
      const bp = child.userData.basePos;
      if (G.crewReloading && child.userData.crewIdx > 0) {
        const spec = SHIP_TYPES[G.player.shipType];
        const cannonSide = child.userData.crewIdx % 2 === 0 ? 1 : -1;
        const cannonZ = (Math.floor(child.userData.crewIdx / 2) - 1) * 1.8;
        const tx = cannonSide * spec.hullW * 0.35;
        child.position.x += (tx - child.position.x) * 6 * dt;
        child.position.z += (cannonZ - child.position.z) * 6 * dt;
      } else {
        child.userData.wanderTimer -= dt;
        if (child.userData.wanderTimer <= 0) {
          child.userData.wanderTimer = 2 + Math.random() * 4;
          child.position.x = bp.x + (Math.random() - 0.5) * 0.4;
          child.position.z = bp.z + (Math.random() - 0.5) * 0.4;
        }
        child.position.x += (bp.x - child.position.x) * 1.5 * dt;
        child.position.z += (bp.z - child.position.z) * 1.5 * dt;
      }
    }
  });

  G.otherPlayers.forEach((p, id) => {
    if (!otherShipGroups.has(id)) { const sm = buildShipMesh(p.shipType || 'sloop', p.shipParts || { hull: 'basic', sail: 'basic', cannon: 'none', figurehead: 'none' }, p.color); otherShipGroups.set(id, sm); scene.add(sm); }
    const sg = otherShipGroups.get(id);
    sg.position.lerp(new THREE.Vector3(p.x, SEA_LEVEL + 0.4 + Math.sin(G.time * 1.5 + id) * 0.25, p.z), 5 * dt);
    sg.rotation.y = p.rotation || 0;
  });

  for (let i = G.cannonballs.length - 1; i >= 0; i--) {
    const b = G.cannonballs[i];
    b.x += b.dx * dt; b.z += b.dz * dt; b.dy -= 15 * dt; b.y += b.dy * dt; b.life -= dt;
    if (cannonballMeshes[i]) cannonballMeshes[i].position.set(b.x, b.y, b.z);
    G.npcs.forEach(npc => { if (Math.hypot(b.x - npc.x, b.z - npc.z) < 3) { npc.health -= 15; if (npc.health <= 0) { notify(`Sank ${npc.name}! +30 gold`); const gi = G.player.inventory.find(x => x.id === 'gold'); if (gi) gi.count += 30; scene.remove(npc.mesh); npc.health = -999; } b.life = 0; } });
    if (b.y <= SEA_LEVEL || b.life <= 0) { if (b.y <= SEA_LEVEL) splashes.push(createSplash(b.x, b.z)); if (cannonballMeshes[i]) scene.remove(cannonballMeshes[i]); G.cannonballs.splice(i, 1); cannonballMeshes.splice(i, 1); }
  }
  G.npcs = G.npcs.filter(n => n.health > -900);

  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i]; s.userData.life -= dt * 2;
    s.children.forEach(d => { d.userData.vy -= 10 * dt; d.position.x += d.userData.vx * dt; d.position.y += d.userData.vy * dt; d.position.z += d.userData.vz * dt; d.material.opacity = Math.max(0, s.userData.life); });
    if (s.userData.life <= 0) { scene.remove(s); s.children.forEach(c => { c.geometry.dispose(); c.material.dispose(); }); splashes.splice(i, 1); }
  }

  G.floatingItems.forEach(item => {
    if (item.collected) return;
    if (Math.hypot(G.player.x - item.x, G.player.z - item.z) < 8) {
      item.collected = true;
      const ex = G.player.inventory.find(i => i.id === item.type);
      if (ex) ex.count += (item.type === 'gold' ? 20 : 3);
      notify(`Collected ${item.type}!`);
      islandGroup.traverse(c => { if (c.userData.floatItem === item) c.visible = false; });
    }
  });

  water.position.set(G.player.x, SEA_LEVEL, G.player.z);
  const cDist = G.camera.zoom, cAng = G.camera.angle, cYaw = G.camera.yaw;
  camera.position.set(
    G.player.x + G.camera.offsetX + Math.sin(cYaw) * cDist * 0.5,
    cDist * Math.sin(cAng),
    G.player.z + G.camera.offsetZ + Math.cos(cYaw) * cDist * 0.5
  );
  camera.lookAt(G.player.x + G.camera.offsetX, SEA_LEVEL + 2, G.player.z + G.camera.offsetZ);

  sunLight.position.set(G.player.x + 200, 300, G.player.z + 100);
  sunLight.target.position.set(G.player.x, 0, G.player.z); sunLight.target.updateMatrixWorld();
  sky.position.set(G.player.x, 0, G.player.z);

  sendTimer -= dt;
  if (sendTimer <= 0) { sendUpdate(); sendTimer = 0.05; }
}

function render() {
  waterUniforms.uTime.value = G.time;
  waterUniforms.uCamPos.value.copy(camera.position);
  sky.material.uniforms.uTime.value = G.time;
  renderer.render(scene, camera);
}

function updateHUD() {
  document.getElementById('hud-coords').textContent = `X: ${Math.round(G.player.x)} Z: ${Math.round(G.player.z)}`;
  document.getElementById('hud-speed').textContent = `Speed: ${Math.abs(G.player.speed).toFixed(1)} kn`;
  document.getElementById('hud-health').innerHTML = `\u2665 ${Math.round(G.player.health)}`;
  drawCompass();
}

let autoSaveTimer = 0;
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;
  update(dt); render();
  if (G.mode === 'playing') {
    if (Math.floor(G.time * 4) !== Math.floor((G.time - dt) * 4)) { updateHUD(); drawMinimap(); }
    autoSaveTimer += dt;
    if (autoSaveTimer > 15) { saveProgress(); autoSaveTimer = 0; }
  }
}

function drawCrewPreview() {
  const cv = document.getElementById('crew-preview');
  if (!cv) return;
  const ctx = cv.getContext('2d'), w = 380, h = 160;
  ctx.clearRect(0, 0, w, h);

  const allCrew = getCrewFromUI();
  const count = allCrew.length;
  const spacing = Math.min(80, w / (count + 0.5));
  const startX = (w - spacing * (count - 1)) / 2;

  allCrew.forEach((member, i) => {
    const x = startX + i * spacing, y = h - 20;

    ctx.fillStyle = member.color || '#4a4a4a';
    if (member.outfit === 'coat') {
      ctx.fillRect(x - 12, y - 50, 24, 35);
      ctx.fillRect(x - 14, y - 50, 28, 10);
    } else if (member.outfit === 'vest') {
      ctx.fillRect(x - 10, y - 48, 20, 30);
      ctx.fillStyle = '#d4a070'; ctx.fillRect(x - 6, y - 48, 12, 8);
    } else {
      ctx.fillRect(x - 9, y - 46, 18, 28);
    }

    ctx.fillStyle = '#d4a070';
    ctx.beginPath(); ctx.arc(x, y - 58, 10, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(x - 5, y - 15, 4, 15); ctx.fillRect(x + 1, y - 15, 4, 15);

    if (member.hat === 'tricorn') {
      ctx.fillStyle = '#2a1a0a';
      ctx.beginPath(); ctx.moveTo(x - 14, y - 64); ctx.lineTo(x + 14, y - 64); ctx.lineTo(x + 10, y - 60);
      ctx.lineTo(x, y - 72); ctx.lineTo(x - 10, y - 60); ctx.closePath(); ctx.fill();
    } else if (member.hat === 'bandana') {
      ctx.fillStyle = '#cc2222';
      ctx.beginPath(); ctx.arc(x, y - 60, 11, Math.PI, 0); ctx.fill();
      ctx.fillRect(x + 8, y - 60, 8, 3);
    } else if (member.hat === 'captain') {
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(x - 12, y - 68, 24, 6);
      ctx.fillRect(x - 8, y - 74, 16, 8);
      ctx.fillStyle = '#d4a848';
      ctx.fillRect(x - 4, y - 72, 8, 3);
    } else if (member.hat === 'hood') {
      ctx.fillStyle = '#3a3a3a';
      ctx.beginPath(); ctx.arc(x, y - 58, 13, Math.PI * 1.2, Math.PI * -0.2); ctx.fill();
    }

    if (member.parrot) {
      ctx.fillStyle = '#22aa22';
      ctx.beginPath(); ctx.arc(x + 15, y - 55, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(x + 15, y - 60, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(x + 18, y - 61, 4, 2);
    }

    ctx.fillStyle = '#d4a848'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(member.name.length > 12 ? member.name.slice(0, 11) + '..' : member.name, x, y + 14);
    ctx.fillStyle = '#888'; ctx.font = '8px sans-serif';
    ctx.fillText(member.role, x, y + 24);
  });
}

function getCrewFromUI() {
  const capName = document.getElementById('cap-name')?.value.trim() || 'Captain';
  const capColor = document.querySelector('#cap-colors .color-swatch.sel')?.dataset.color || '#8b0000';
  const capHat = document.querySelector('#cap-hat .color-swatch.sel')?.dataset.optId || 'tricorn';
  const capOutfit = document.querySelector('#cap-outfit .color-swatch.sel')?.dataset.optId || 'coat';
  const capParrot = document.getElementById('cap-parrot')?.checked || false;

  const crew = [{ name: capName, role: 'captain', color: capColor, hat: capHat, outfit: capOutfit, parrot: capParrot }];
  document.querySelectorAll('.crew-name').forEach((input, idx) => {
    const name = input.value.trim() || 'Pirate';
    const row = document.querySelector(`.crew-color-row[data-idx="${idx}"]`);
    const color = row?.querySelector('.color-swatch.sel')?.dataset.color || '#3a3a3a';
    const hatRow = document.querySelector(`.crew-hat-row[data-idx="${idx}"]`);
    const hat = hatRow?.querySelector('.color-swatch.sel')?.dataset.optId || 'none';
    const roles = ['gunner', 'sailor', 'navigator'];
    crew.push({ name, role: roles[idx] || 'sailor', color, hat, outfit: 'vest', parrot: false });
  });
  return crew;
}

let previewRenderer, previewScene, previewCamera, previewShip;

function setup3DPreview() {
  const container = document.getElementById('preview-3d');
  if (!container) return;
  previewRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  previewRenderer.setSize(container.clientWidth, 200);
  previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  previewRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  container.appendChild(previewRenderer.domElement);

  previewScene = new THREE.Scene();
  previewScene.add(new THREE.AmbientLight(0x8899bb, 0.8));
  const pSun = new THREE.DirectionalLight(0xffeedd, 1.5);
  pSun.position.set(5, 10, 5); previewScene.add(pSun);
  previewScene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a6b35, 0.3));

  previewCamera = new THREE.PerspectiveCamera(40, container.clientWidth / 200, 0.1, 100);
  previewCamera.position.set(8, 6, 8);
  previewCamera.lookAt(0, 1, 0);

  updatePreviewShip();
}

function updatePreviewShip() {
  if (!previewScene) return;
  if (previewShip) previewScene.remove(previewShip);
  const allCrew = getCrewFromUI();
  const shipName = document.getElementById('ship-name-input')?.value.trim() || 'The Black Wave';
  previewShip = buildShipMesh(G.player.shipType, G.player.shipParts, null, shipName);
  buildCrewMeshes(previewShip, allCrew.map((c, i) => ({
    ...c, health: 100, task: ['helm','cannons','sails','lookout'][i] || 'idle'
  })), G.player.shipType);
  previewScene.add(previewShip);
}

function renderPreview() {
  if (!previewRenderer || !previewScene) return;
  if (previewShip) previewShip.rotation.y += 0.005;
  previewRenderer.render(previewScene, previewCamera);
  if (document.getElementById('create-screen')?.style.display !== 'none') requestAnimationFrame(renderPreview);
}

function buildCreationUI() {
  makeColorRow(document.getElementById('cap-colors'), CREW_COLORS, '#8b0000');
  makeOptionRow(document.getElementById('cap-hat'), HAT_OPTIONS, 'tricorn', 'hat');
  makeOptionRow(document.getElementById('cap-outfit'), OUTFIT_OPTIONS, 'coat', 'outfit');
  document.getElementById('cap-parrot').onchange = () => { drawCrewPreview(); updatePreviewShip(); };
  document.getElementById('cap-name').oninput = () => { drawCrewPreview(); updatePreviewShip(); };
  document.getElementById('ship-name-input').oninput = updatePreviewShip;

  const crewDiv = document.getElementById('crew-editors');
  crewDiv.innerHTML = '';
  const defaultCrew = [
    { name: 'Salty Pete', role: 'gunner', color: '#3a3a3a', hat: 'bandana' },
    { name: 'One-Eye Jack', role: 'sailor', color: '#2a6a2a', hat: 'none' },
    { name: 'Red Mary', role: 'navigator', color: '#1a3a6a', hat: 'tricorn' }
  ];
  defaultCrew.forEach((c, idx) => {
    const div = document.createElement('div');
    div.className = 'crew-edit';
    div.innerHTML = `
      <span class="role-tag">${c.role}</span>
      <label>Name</label>
      <input type="text" class="crew-name" data-idx="${idx}" value="${c.name}" maxlength="24" />
      <label>Outfit Color</label>
      <div class="color-row crew-color-row" data-idx="${idx}"></div>
      <label>Hat</label>
      <div class="color-row crew-hat-row" data-idx="${idx}"></div>
    `;
    crewDiv.appendChild(div);
    makeColorRow(div.querySelector('.crew-color-row'), CREW_COLORS, c.color);
    makeOptionRow(div.querySelector('.crew-hat-row'), HAT_OPTIONS, c.hat, 'hat');
    div.querySelector('.crew-name').oninput = () => { drawCrewPreview(); updatePreviewShip(); };
  });
  drawCrewPreview();
  setup3DPreview();
  requestAnimationFrame(renderPreview);
}

function launchGame() {
  G.player.shipName = document.getElementById('ship-name-input')?.value.trim() || 'The Black Wave';
  const allCrew = getCrewFromUI();
  G.player.crew = allCrew.map((c, i) => ({
    name: c.name, role: c.role, health: 100, color: c.color, hat: c.hat, outfit: c.outfit, parrot: c.parrot,
    task: ['helm', 'cannons', 'sails', 'lookout'][i] || 'idle'
  }));

  document.getElementById('create-screen').style.display = 'none';
  if (!isMobile) {
    document.getElementById('controls-help').style.display = 'block';
    setTimeout(() => document.getElementById('controls-help').style.display = 'none', 5000);
  }
  G.mode = 'playing';
  noise = new SimplexNoise(G.seed);
  rebuildPlayerShip(); updateChunks(); spawnNPCs(); connectToServer();
}

/* ============================== PERSISTENCE ============================== */
const SAVE_KEY = 'pirates_save_v1';

function saveProgress() {
  try {
    const data = {
      x: G.player.x, z: G.player.z, rotation: G.player.rotation,
      health: G.player.health, shipType: G.player.shipType,
      shipName: G.player.shipName,
      shipParts: G.player.shipParts,
      inventory: G.player.inventory,
      crew: G.player.crew,
      gold: G.player.inventory.find(i => i.id === 'gold')?.count || 0
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.x !== undefined) G.player.x = data.x;
    if (data.z !== undefined) G.player.z = data.z;
    if (data.rotation !== undefined) G.player.rotation = data.rotation;
    if (data.health !== undefined) G.player.health = data.health;
    if (data.shipName) G.player.shipName = data.shipName;
    if (data.shipType) G.player.shipType = data.shipType;
    if (data.shipParts) G.player.shipParts = data.shipParts;
    if (data.inventory) G.player.inventory = data.inventory;
    if (data.crew) G.player.crew = data.crew;
    return true;
  } catch (e) { return false; }
}

let saveTimer = 0;
const origUpdate = update;

/* ============================== INIT ===================================== */
const hasSave = loadProgress();

document.getElementById('start-btn').onclick = () => {
  document.getElementById('start-screen').style.display = 'none';
  if (hasSave) {
    document.getElementById('create-screen').style.display = 'none';
    G.mode = 'playing';
    noise = new SimplexNoise(G.seed);
    rebuildPlayerShip(); updateChunks(); spawnNPCs(); connectToServer();
    notify('Progress restored');
    if (!isMobile) { document.getElementById('controls-help').style.display = 'block'; setTimeout(() => document.getElementById('controls-help').style.display = 'none', 4000); }
  } else {
    document.getElementById('create-screen').style.display = 'block';
    buildCreationUI();
  }
};

document.getElementById('new-game-btn').onclick = () => {
  localStorage.removeItem(SAVE_KEY);
  G.player.x = 0; G.player.z = 0; G.player.rotation = 0; G.player.speed = 0;
  G.player.health = 100; G.player.shipName = 'The Black Wave'; G.player.shipType = 'sloop';
  G.player.shipParts = { hull: 'basic', sail: 'basic', cannon: 'light', figurehead: 'none' };
  G.player.inventory = [
    { id: 'wood', name: 'Wood Planks', icon: 'W', count: 10 },
    { id: 'cloth', name: 'Sail Cloth', icon: 'C', count: 5 },
    { id: 'iron', name: 'Iron Ingot', icon: 'Fe', count: 3 },
    { id: 'gold', name: 'Gold Coins', icon: 'Au', count: 50 },
    { id: 'rum', name: 'Rum Barrels', icon: 'R', count: 2 },
    { id: 'gunpowder', name: 'Gunpowder', icon: 'GP', count: 5 }
  ];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('create-screen').style.display = 'block';
  buildCreationUI();
};

document.getElementById('start-btn').textContent = hasSave ? 'Continue Voyage' : 'Create Your Crew';
if (hasSave) document.getElementById('new-game-btn').style.display = 'block';

document.getElementById('create-launch').onclick = launchGame;

requestAnimationFrame(gameLoop);

window.render_game_to_text = function () {
  return JSON.stringify({ mode: G.mode, player: { x: Math.round(G.player.x * 10) / 10, z: Math.round(G.player.z * 10) / 10, rotation: Math.round(G.player.rotation * 100) / 100, speed: Math.round(G.player.speed * 100) / 100, health: G.player.health, anchored: G.player.anchored, shipType: G.player.shipType, shipParts: G.player.shipParts, crewCount: G.player.crew.length, inventoryCount: G.player.inventory.reduce((a, b) => a + b.count, 0) }, world: { chunksLoaded: G.chunks.size, islandsVisible: G.islands.length, otherPlayers: G.otherPlayers.size, cannonballs: G.cannonballs.length, npcs: G.npcs.length }, camera: { zoom: Math.round(G.camera.zoom) }, wind: { angle: Math.round(G.wind.angle * 100) / 100, speed: Math.round(G.wind.speed * 10) / 10 } });
};
window.advanceTime = (ms) => { const s = Math.max(1, Math.round(ms / (1000 / 60))); for (let i = 0; i < s; i++) update(1 / 60); render(); };
</script>
